model:
  target: cldm.cldm.ControlLDMEps2V
  params:
    linear_start: 0.00085
    linear_end: 0.0120
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: "jpg"
    cond_stage_key: "txt"
    control_key: "hint"
    image_size: 64
    channels: 4
    cond_stage_trainable: false
    conditioning_key: crossattn
    monitor: val/loss_simple_ema
    scale_factor: 0.18215
    use_ema: False
    only_mid_control: False

    control_stage_config:
      target: cldm.cldm.ControlNet
      params:
        image_size: 32 # unused
        in_channels: 4
        hint_channels: 3
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_heads: 8
        use_spatial_transformer: True
        transformer_depth: 1
        context_dim: 768
        use_checkpoint: True
        legacy: False

    unet_config:
      target: cldm.cldm.ControlledUnetModel
      params:
        image_size: 32 # unused
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_heads: 8
        use_spatial_transformer: True
        transformer_depth: 1
        context_dim: 768
        use_checkpoint: True
        legacy: False

    first_stage_config:
      target: ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: ldm.modules.encoders.modules.FrozenCLIPEmbedder

data:
  target: utils.utils.DataloaderFromConfig2
  params:
    batch_size: 8
    num_workers: 8
    train:
      target: utils.control_datasets.PoseControl
      params:
        root: control_datasets/coco_keypoints/train
        metadata_path: control_datasets/coco_keypoints/train/metadata.csv
        keypoints_json_path: <path_to_coco2017_folder>/annotations/person_keypoints_train2017.json
        image_size: 512
        p_drop: 0.5
    validation:
      target: utils.control_datasets.PoseControl
      params:
        root: control_datasets/coco_keypoints/val
        metadata_path: control_datasets/coco_keypoints/val/metadata.csv
        keypoints_json_path: <path_to_coco2017_folder>/annotations/person_keypoints_val2017.json
        image_size: 512
        p_drop: 0.

evaluator:
  target: utils.control_evaluators.PoseEvaluator
        
lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 10000
        max_images: 4
        increase_log_steps: False